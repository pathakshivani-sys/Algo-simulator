<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn | AlgoRace Educational Galaxy</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="bg-mesh"></div>

  <header id="top-header">
    <div class="logo">
      <h1 class="font-heading">Algo<span class="gradient-text">Race</span></h1>
      <p>Visual Algorithm Simulator</p>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="arena.html" class="nav-link">Arena</a>
      <a href="learn.html" class="nav-link active">Learn</a>
      <a href="about.html" class="nav-link">About</a>
    </nav>
  </header>

  <main>
    <section id="education" class="edu-section">
      <div class="section-intro">
        <h2 class="section-title font-heading">Algorithm <span class="gradient-text">Galaxy</span></h2>
        <p class="section-sub">Explore every algorithm — complexity tables, pseudocode, full source code, and interactive simulations.</p>
      </div>

      <div class="edu-tabs" id="edu-tabs">
        <button class="edu-tab active" data-cat="sorting">🔢 Sorting</button>
        <button class="edu-tab" data-cat="searching">🔍 Searching</button>
        <button class="edu-tab" data-cat="graphs">🕸️ Graphs</button>
        <button class="edu-tab" data-cat="pathfinding">🗺️ Pathfinding</button>
      </div>

      <!-- Cards grid filled by JS -->
      <div id="edu-grid" class="edu-grid"></div>

      <!-- Detail panel (shown when a card is clicked) -->
      <div id="detail-panel" class="detail-panel hidden">
        <button id="detail-close" class="detail-close btn btn-outline">← Back</button>
        <div id="detail-body"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-bottom">&copy; 2026 AlgoRace — Educational Project</div>
  </footer>

  <script type="module" src="src/learn.js"></script>
  <script type="module">
    import { initParticles } from './src/particles.js';
    window.addEventListener('DOMContentLoaded', () => initParticles('particles'));
  </script>
</body>
</html>
